- name: Changi Airport Terminal
  logo: fas fa-plane-departure
  image: /images/sections/projects/changi-airport.png
  role: BIM Engineer (Structure & MEP, Clash Detection)
  timeline: "04/2025 - 02/2026"
  clientPartner: "ATLAS INDUSTRIES (VIETNAM) LIMITED"
  clientLogo: /images/sections/projects/atlas-logo.png
  summary: |
    **Project:** Revised and developed structural and MEP BIM models for Changi Airport terminal scope based on issued design packages; produced technical drawings for construction execution.

    **Role:** Responsible for structural and MEP model revisions, interdisciplinary clash checks, and technical coordination to maintain drawing-model consistency at issue stage.

    **Technology:** Autodesk Revit, Navisworks Manage, Autodesk Construction Cloud.

    **Outcomes:**
    - Completed coordinated structural and MEP BIM models aligned with design requirements and field execution constraints.
    - Identified and resolved structure-MEP clashes before construction stage, reducing site-level rework risk.
    - Issued model-based technical drawing packages with consistent geometry and documentation outputs.
  tags: ["professional", "bim", "revit", "mep", "structure", "clash-detection", "airport"]

- name: Sleeping Beauty Castle Connector Bridge (Disneyland)
  logo: fas fa-archway
  image: /images/sections/projects/disney-castle-bridge.jpg
  role: BIM Engineer (Construction Method, Existing Conditions Point Cloud)
  timeline: "02/2025 - 03/2025"
  clientPartner: "PENROZ FRANCE VIETNAM COMPANY LIMITED"
  clientLogo: /images/sections/projects/penroz-logo.png
  summary: |
    **Project:** Developed a repair construction method proposal for the existing connector bridge at the Sleeping Beauty Castle zone (Disneyland); prepared step-by-step construction sequence drawings for execution.

    **Role:** Responsible for existing-condition modeling from point cloud data, technical method development, and production of construction sequence drawing packages.

    **Technology:** Autodesk Revit, Point Cloud.

    **Outcomes:**
    - Built a reliable existing-condition model from scan data as the technical baseline for repair strategy.
    - Delivered staged construction sequence drawings with clear execution logic for field implementation.
    - Standardized technical data across model and issued documents, reducing coordination mismatches.
  tags: ["professional", "bim", "revit", "point-cloud", "construction-method", "rehabilitation", "bridge"]

- name: Sycamore CapitaLand (Binh Duong)
  logo: fas fa-city
  image: /images/sections/projects/sycamore.png
  role: BIM Engineer (Landscape & Structure, Shop Drawing & QTO)
  timeline: "04/2024 - 12/2024"
  clientPartner: "FECON SOUTH JOINT STOCK COMPANY"
  clientLogo: /images/sections/projects/fecon-logo.png
  summary: |
    **Project:** Delivered BIM modeling and Shop Drawing documentation for landscape architecture and rebar scope in CapitaLand's large-scale urban development in Binh Duong.

    **Role:** Led Landscape & Structure BIM package coordination with FECON.

    **Technology:** Revit, Dynamo.

    **Outcomes:**
    - Developed a parametric landscape family library to accelerate model delivery and standardize BIM data.
    - Applied Dynamo to automate rebar placement and rebar Shop Drawing outputs, reducing manual errors and improving documentation accuracy.
    - Extracted accurate BIM-based quantities (QTO) to support material control and cost estimation workflows.
  tags: ["professional", "bim", "revit", "dynamo", "landscape", "rebar"]

