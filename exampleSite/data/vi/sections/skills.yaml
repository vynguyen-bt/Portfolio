- name: Tiếng Anh chuyên ngành
  icon: fas fa-language
  summary: "Đọc hiểu tài liệu kỹ thuật, tiêu chuẩn quốc tế và giao tiếp chuyên môn hiệu quả. TOEIC 680/990 | VSTEP Bậc 4."
