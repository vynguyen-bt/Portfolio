# Kinh nghiệm làm việc
experiences:
- company:
    name: Công ty Cổ phần Đổi mới Quản lý Công nghệ Xây dựng (BIMTECH)
    location: Thành phố Hồ Chí Minh, Việt Nam
    logo: /images/sections/experiences/bimtech-logo.png
    overview: BIMTech là đơn vị tiên phong cung cấp giải pháp công nghệ xây dựng, chuyên sâu về Mô hình Thông tin Công trình (BIM) và các công cụ số đổi mới cho ngành xây dựng. Đội ngũ chuyên gia của công ty kết hợp nền tảng kỹ thuật với kinh nghiệm thực tiễn để cung cấp dịch vụ chất lượng cao, góp phần thay đổi cách công trình được thiết kế, thi công và vận hành.
  positions:
  - designation: BIM Specialist
    start: Tháng 5/2023
    end: Tháng 3/2026
    responsibilities:
    - Phát triển và cập nhật mô hình BIM đa bộ môn theo hồ sơ thiết kế và yêu cầu triển khai thực tế.
    - Kiểm tra, phát hiện và xử lý xung đột giữa các bộ môn để đảm bảo tính đồng bộ của hồ sơ kỹ thuật.
    - Triển khai bản vẽ kỹ thuật từ mô hình và phối hợp nhóm dự án trong quá trình phát hành hồ sơ.
    - Quản lý dữ liệu mô hình trên nền tảng số nhằm duy trì tính nhất quán giữa mô hình, bản vẽ và tiến độ.

- company:
    name: BIMLab - Trường Đại học Bách khoa Thành phố Hồ Chí Minh
    location: Thành phố Hồ Chí Minh, Việt Nam
    logo: /images/sections/experiences/bimlab-logo.png
    overview: Môi trường đào tạo và ứng dụng BIM, kết nối giữa học thuật và thực tiễn triển khai dự án, tập trung vào năng lực mô hình hóa, phối hợp liên bộ môn và tiêu chuẩn triển khai BIM.
  positions:
  - designation: BIM Specialist
    start: Tháng 7/2022
    end: Tháng 5/2023
    responsibilities:
    - Tham gia phát triển mô hình BIM kiến trúc và kết cấu cho các bài toán mô phỏng dự án thực tế.
    - Chuẩn hóa Family, template và quy trình làm việc để tăng tính thống nhất giữa các nhóm triển khai.
    - Phối hợp kiểm tra chất lượng mô hình và hồ sơ đầu ra trước khi bàn giao nội bộ.

  - designation: Người hướng dẫn Revit Kiến trúc (Mentor bán thời gian)
    start: Tháng 6/2023
    end: Tháng 7/2025
    responsibilities:
    - Hướng dẫn học viên xây dựng mô hình Revit Architecture theo quy trình từ cơ bản đến nâng cao.
    - Định hướng phương pháp tổ chức model, kiểm soát dữ liệu và trình bày hồ sơ kỹ thuật trong môi trường BIM.
    - Rà soát bài tập và phản biện kỹ thuật để nâng cao chất lượng đầu ra của học viên.
