- name: Nhà ga Hàng không Changi (Singapore)
  logo: fas fa-plane-departure
  image: /images/sections/projects/changi-airport.png
  role: Điều phối BIM (Kết cấu & MEP)
  timeline: "04/2025 - 02/2026"
  clientPartner: "CÔNG TY TNHH CÔNG NGHIỆP TOÀN CẦU"
  clientLogo: /images/atlas logo.png
  summary: |
    **Mô tả ngắn:**
    Hiệu chỉnh mô hình BIM và triển khai bản vẽ kỹ thuật (Shop Drawings) cho hạng mục Kết cấu & MEP theo tiêu chuẩn Singapore.

    **Kết quả nổi bật:**
    - **Phối hợp đa bộ môn:** Xử lý triệt để các xung đột (Clash Detection) giữa Kết cấu và MEP, tối ưu hóa không gian lắp đặt thiết bị nhà ga.
    - **Tính nhất quán:** Đảm bảo sự đồng bộ 100% giữa mô hình 3D và hồ sơ bản vẽ phát hành (Drawing Production).
    - **Quản lý dữ liệu:** Kiểm soát và vận hành quy trình trao đổi thông tin trên nền tảng Autodesk Construction Cloud (ACC).
  tags: ["professional", "bim", "revit", "mep", "structure", "clash-detection", "airport"]

- name: Cầu kết nối Lâu đài Công chúa Ngủ trong rừng (Disneyland)
  logo: fas fa-archway
  image: /images/sections/projects/disney-castle-bridge.jpg
  role: Kỹ sư BIM (Biện pháp thi công, Mô hình hiện trạng Point Cloud)
  timeline: "02/2025 - 03/2025"
  clientPartner: "CÔNG TY TNHH PENROZ PHÁP VIỆT"
  clientLogo: /images/sections/projects/penroz-logo.png
  summary: |
    **Mô tả ngắn:**
    Xây dựng mô hình hiện trạng từ dữ liệu quét laser (Point Cloud) và lập phương án, bản vẽ trình tự thi công sửa chữa cho hạng mục cầu kết nối hiện trạng.

    **Kết quả nổi bật:**
    - **Scan-to-BIM:** Chuyển đổi dữ liệu Point Cloud thành mô hình 3D có độ chính xác cao, cung cấp cơ sở dữ liệu tin cậy cho công tác thiết kế sửa chữa.
    - **4D Simulation:** Xây dựng bộ bản vẽ trình tự thi công chi tiết theo từng giai đoạn, đảm bảo tính khả thi và an toàn tuyệt đối cho công trình hiện trạng.
    - **Chuẩn hóa hồ sơ:** Đồng bộ hóa dữ liệu kỹ thuật giữa mô hình hiện trạng và hồ sơ phát hành, loại bỏ sai lệch thông tin trong quá trình phối hợp hiện trường.
  tags: ["professional", "bim", "revit", "point-cloud", "construction-method", "rehabilitation", "bridge"]

- name: Sycamore CapitaLand (Bình Dương)
  logo: fas fa-city
  image: /images/sections/projects/sycamore.png
  role: Kỹ sư BIM (Landscape & Structure)
  timeline: "04/2024 - 12/2024"
  clientPartner: "CÔNG TY CỔ PHẦN FECON SOUTH"
  clientLogo: /images/sections/projects/fecon-logo.png
  summary: |
    **Mô tả ngắn:**
    Triển khai mô hình BIM và hệ thống Shop Drawings cho hạng mục Cảnh quan & Cốt thép (Rebar) trong khu đô thị quy mô lớn của CapitaLand tại Bình Dương.

    **Kết quả nổi bật:**
    - **Tham số hóa (Parametric Design):** Xây dựng hệ thống thư viện Family cảnh quan thông minh, giúp chuẩn hóa dữ liệu và tăng 30% tốc độ dựng mô hình.
    - **Tự động hóa (Rebar Automation):** Ứng dụng **Dynamo** để tự động hóa bố trí cốt thép và xuất **Shop Drawings**, loại bỏ sai sót thủ công và đảm bảo độ chính xác tuyệt đối cho hồ sơ thi công.
    - **Số hóa khối lượng (BIM QTO):** Thiết lập quy trình trích xuất khối lượng tự động từ mô hình, phục vụ công tác kiểm soát vật tư và tối ưu hóa dự toán cho dự án.
  tags: ["professional", "bim", "revit", "dynamo", "landscape", "rebar"]

- name: Nhà máy gia công gỗ
  logo: fas fa-building
  image: /images/sections/projects/myda.png
  role: Kỹ sư BIM (LOD 300 & Construction Animation)
  timeline: "01/2024 - 02/2024"
  clientPartner: "CÔNG TY XÂY DỰNG MỸ ĐÀ"
  clientLogo: /images/sections/projects/myda-logo.png
  summary: |
    **Mô tả ngắn:**
    Xây dựng mô hình BIM LOD 300 và sản xuất video diễn họa 3D biện pháp thi công phục vụ hồ sơ đấu thầu cho toàn bộ xưởng gia công gỗ.

    **Kết quả nổi bật:**
    - **Mô hình hóa LOD 300:** Hoàn thiện mô hình cấu kiện nhà xưởng với độ chi tiết cao (Level of Development 300), phục vụ bóc tách khối lượng và kiểm soát phương án thi công chính xác.
    - **Diễn họa biện pháp thi công:** Xây dựng chuỗi video mô phỏng trình tự thi công 3D sinh động, giúp tăng tính thuyết phục và trực quan cho hồ sơ thầu trước chủ đầu tư.
    - **Trình bày kỹ thuật:** Ứng dụng Adobe Illustrator để chuẩn hóa bộ bản vẽ biện pháp thi công theo giai đoạn, giúp đội ngũ hiện trường dễ dàng theo dõi trình tự thực hiện.
  tags: ["professional", "bim", "revit", "construction-method", "3d-visualization"]

- name: Dãy nhà liền kề
  logo: fas fa-building
  image: /images/sections/projects/nha-lien-ke.png
  role: Kỹ sư BIM (Structure & Rebar Specialist)
  timeline: "08/2023 - 09/2023"
  clientPartner: "CÔNG TY CỔ PHẦN XÂY DỰNG AN PHÚ GIA"
  clientLogo: /images/sections/projects/apg-logo.jpg
  summary: |
    **Mô tả ngắn:**
    Triển khai mô hình BIM Kết cấu, chi tiết cốt thép (Rebar) và lập hồ sơ hoàn công cho dự án dãy nhà phố liền kề.

    **Kết quả nổi bật:**
    - **Chi tiết hóa Cốt thép (Rebar):** Hoàn thiện mô hình cốt thép 3D độ chi tiết cao, phục vụ xuất bản vẽ **Shop Drawing** chính xác và giảm thiểu hao hụt thép tại công trường.
    - **Số hóa hoàn công:** Cập nhật mô hình BIM bám sát thực tế thi công (As-built), chuẩn hóa dữ liệu bàn giao và quản lý vận hành cho chủ đầu tư.
    - **Quản lý khối lượng:** Trích xuất bảng thống kê khối lượng (QTO) tự động, hỗ trợ lập kế hoạch cung ứng vật tư sát với tiến độ thi công thực tế.
  tags: ["professional", "bim", "revit", "shop-drawing", "qto", "rebar", "structure"]

- name: The Grand Manhattan
  logo: fas fa-city
  image: /images/sections/projects/grand-manhattan-q1.png
  role: Kỹ sư BIM (Architecture, Structure & Construction Method)
  timeline: "07/2022 - 12/2022"
  clientPartner: "CÔNG TY CỔ PHẦN ĐẦU TƯ XÂY DỰNG RICONS"
  clientLogo: /images/sections/projects/ricons-logo.png
  summary: |
    **Mô tả ngắn:**
    Triển khai mô hình BIM đa bộ môn (Kiến trúc, Kết cấu) và mô phỏng biện pháp thi công cho dự án tổ hợp căn hộ cao cấp tại trung tâm TP.HCM.

    **Kết quả nổi bật:**
    - **Phối hợp thiết kế - thi công:** Hoàn thiện mô hình BIM đồng bộ, giúp kiểm soát xung đột (Clash Detection) và xử lý kỹ thuật kịp thời trước khi triển khai hiện trường.
    - **Tối ưu hóa Shop Drawings:** Triển khai hệ thống bản vẽ **Shop Drawings** hoàn thiện và thống kê khối lượng (QTO) trực tiếp từ mô hình, tăng 20% hiệu quả quản lý vật tư.
    - **Biện pháp thi công:** Xây dựng mô hình mô phỏng biện pháp thi công trực quan, hỗ trợ ban chỉ huy dự án kiểm soát tiến độ và biện pháp an toàn.
  tags: ["professional", "bim", "revit", "architecture", "structure", "shop-drawing", "qto", "clash-detection"]

